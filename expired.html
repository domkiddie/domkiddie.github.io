<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Subscription Expired</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background-color: #121212;
      color: #e0e0e0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      text-align: center;
      max-width: 500px;
      padding: 40px;
      background: #1e1e1e;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.8);
    }
    h1 {
      font-size: 2em;
      color: #ff5252;
      margin-bottom: 20px;
    }
    p {
      font-size: 1.1em;
      line-height: 1.6;
      margin-bottom: 30px;
    }
    .btn {
      display: inline-block;
      padding: 12px 24px;
      background: #ff5252;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      transition: background 0.3s ease;
    }
    .btn:hover {
      background: #ff7979;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Subscription Expired</h1>
    <p>Your premium access has <strong>ended</strong>.<br>
       Please renew your subscription to continue enjoying ad‑free streaming.</p>
    <a href="https://nontongo.win/contact/" class="btn">RENEW IT</a>
  </div>
</body>
</html>
