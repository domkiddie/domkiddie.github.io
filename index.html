<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>domkiddie.github.io</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0d0d0d;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    h1 {
      font-size: 3em;
      color: #00ffff;
      text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff, 0 0 40px #00ffff;
      margin-bottom: 10px;
      animation: glow 2s infinite alternate;
    }
    h2 {
      font-size: 1.5em;
      color: #ff00ff;
      text-shadow: 0 0 5px #ff00ff, 0 0 15px #ff00ff;
      margin-bottom: 30px;
    }
    p {
      font-size: 1.1em;
      color: #ccc;
      max-width: 600px;
      margin-bottom: 40px;
    }
    .btn {
      padding: 12px 24px;
      background: #111;
      border: 2px solid #00ffff;
      color: #00ffff;
      text-decoration: none;
      border-radius: 8px;
      box-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
      transition: all 0.3s ease;
    }
    .btn:hover {
      background: #00ffff;
      color: #111;
      box-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff;
    }
    @keyframes glow {
      from { text-shadow: 0 0 10px #00ffff; }
      to { text-shadow: 0 0 30px #00ffff, 0 0 60px #00ffff; }
    }
  </style>
</head>
<body>
  <h1>🚀 domkiddie.github.io</h1>
  <h2>Backend of CinePro</h2>
  <p>
    Welcome to the backend playground of CinePro.<br>
    This repo hosts experimental scripts, expired domain handlers, and streaming backend prototypes.<br>
    Stay tuned for more updates!
  </p>
  <a href="https://github.com/domkiddie/js" class="btn">View Repository</a>
</body>
</html>
